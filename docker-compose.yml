

services:
  # 1. The Database
  influxdb:
    image: influxdb:2.0
    container_name: turbine_influx
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=ruas
      - DOCKER_INFLUXDB_INIT_BUCKET=ruas
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=stGlbfflFYJOTzrAq6oQXRGQ6H8ez9ROn3mT8Tt_y8i4GBBwYUFT1sT3dlo5T7uxboTRjzkMM_aLyU6bczf0xg==
    volumes:
      - influxdb-data:/var/lib/influxdb2

  # 2. The Physics Simulator
  modbus-server:
    build: ./backend
    container_name: turbine_physics
    command: python modbus_server.py
    ports:
      - "5020:5020"

  # 3. The Data Harvester
  harvester:
    build: ./backend
    container_name: turbine_harvester
    command: python data_harvester.py
    depends_on:
      - influxdb
      - modbus-server

  # 4. The AI Backend API
  fastapi-backend:
    build: ./backend
    container_name: turbine_api
    command: uvicorn fast_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - influxdb
      - modbus-server

  # 5. The React Dashboard
  frontend:
    build: ./frontend
    container_name: turbine_dashboard
    ports:
      - "5173:80" 

volumes:
  influxdb-data: